<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>予約システム</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>

<body>

  <!-- タブ -->
  <div class="type-tabs">
      <button id="tab-online" class="active">オンライン</button>
      <button id="tab-offline">対面</button>
  </div>

  <!-- 月間カレンダー -->
  <div id="month-calendar">
    <div id="calendar-header">
      <button id="prev-month">＜</button>
      <span id="calendar-title"></span>
      <button id="next-month">＞</button>
    </div>
    <div id="calendar-grid"></div>
  </div>

  <!-- 枠一覧 -->
  <div id="slot-list">
      <h3 id="slot-title"></h3>
      <div id="slots"></div>
  </div>

  <!-- 予約モーダル -->
  <div id="confirm-modal" class="modal">
    <div class="modal-content">
      <p id="confirm-text"></p>
      <div id="confirm-options"></div>
      <button id="confirm-cancel">閉じる</button>
    </div>
  </div>

  <!-- 予約変更モーダル -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <h3>予約変更</h3>

      <p id="edit-old-time"></p>

      <label>新しい開始時間</label>
      <input type="datetime-local" id="edit-start">

      <label>新しい終了時間</label>
      <input type="datetime-local" id="edit-end">

      <button id="edit-ok">変更する</button>
      <button id="edit-cancel">閉じる</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js?v=4"></script>
  <script src="config.js?v=4"></script>
  <script src="script.js?v=4"></script>

</body>
</html>
