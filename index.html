<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>予約システム</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>

<body>

  <!-- タブ -->
  <div class="type-tabs">
      <button id="tab-online" class="active">オンライン</button>
      <button id="tab-offline">対面</button>
  </div>

  <!-- カレンダー（必要なら使う） -->
  <div id="calendar"></div>

  <!-- 枠一覧 -->
  <div id="slot-list">
      <h3 id="slot-title"></h3>
      <div id="slots"></div>
  </div>

  <!-- モーダル -->
  <div id="confirm-modal" class="modal">
    <div class="modal-content">
      <p id="confirm-text"></p>

      <label>開始時間</label>
      <select id="start-time"></select>

      <label>終了時間</label>
      <select id="end-time"></select>

      <button id="confirm-ok">予約する</button>
      <button id="confirm-cancel">キャンセル</button>
    </div>
  </div>

  <!-- 月間カレンダー -->
<div id="month-calendar">
  <div id="calendar-header">
    <button id="prev-month">＜</button>
    <span id="calendar-title"></span>
    <button id="next-month">＞</button>
  </div>
  <div id="calendar-grid"></div>
</div>

  <!-- ローディング -->
  <div id="loading" style="display:none;">読み込み中...</div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js?v=3"></script>
  <script src="config.js?v=3"></script>
  <script src="script.js?v=3"></script>

</body>
</html>
